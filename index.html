<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>マンカラ ゲーム成立版</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>マンカラ</h1>
      <div id="turnBadge" class="turn-badge">あなたの番</div>
    </header>

    <section class="board" aria-label="マンカラ盤面">
      <div class="store opponent-store">
        <div class="store-label">相手ゴール</div>
        <div id="oppStore" class="store-count">0</div>
      </div>

      <div class="pits">
        <div id="opponentRow" class="row top-row"></div>
        <div id="playerRow" class="row bottom-row"></div>
      </div>

      <div class="store player-store">
        <div class="store-label">自分ゴール</div>
        <div id="playerStore" class="store-count">0</div>
      </div>
    </section>

    <section class="message">
      <div id="mainMessage" class="main-message">下の穴をタップして手を進めます</div>
      <div id="subMessage" class="sub-message">AI判定なし。まずゲームルールだけを正確に動かす版です。</div>
    </section>

    <section class="controls">
      <button id="undoBtn" class="btn yellow">一手戻す</button>
      <button id="switchBtn" class="btn white">手番切替</button>
      <button id="resetBtn" class="btn pink">リセット</button>
    </section>

    <section class="manual">
      <h2>盤面を手入力で合わせる</h2>
      <label>自分側 6穴（左から）
        <input id="playerInput" inputmode="numeric" value="4,4,4,4,4,4" />
      </label>
      <label>相手側 6穴（左から）
        <input id="oppInput" inputmode="numeric" value="4,4,4,4,4,4" />
      </label>
      <div class="manual-grid">
        <label>自分ゴール
          <input id="playerStoreInput" inputmode="numeric" value="0" />
        </label>
        <label>相手ゴール
          <input id="oppStoreInput" inputmode="numeric" value="0" />
        </label>
      </div>
      <button id="applyBtn" class="btn green full">この盤面に合わせる</button>
      <p class="note">
        配石順：自分側は左から右へ進み、自分ゴールを越えたら相手1側から入ります。
        相手側は右から左へ進み、相手ゴールを越えたら自分1側から入ります。
      </p>
    </section>
  </main>
  <script src="app.js?v=core-game-v1"></script>
</body>
</html>
